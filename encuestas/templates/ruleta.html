{% extends 'base.html' %}
{% load static %}

{% block header %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">

<style>
    body {
        background-color: #003468 !important;
        background-repeat: repeat;
        font-family: "Montserrat", sans-serif !important;
        color: #eeeeee !important;
    }

    .card {
        background-color: rgba(0, 0, 0, 0) !important;
    }

    .card-borde-personalizado,
    .card-borde-personalizado .card-header,
    .card-borde-personalizado .card-footer {
        border-color: none ; 
        border: 0px solid rgba(0, 0, 0, .125) !important;
        background-color: rgba(0, 0, 0, 0) !important;
    }

    .titulo-ruleta {
        font-size: 20px;
        font-weight: 600;
    }

    .modal-content {
        background-color: rgba(0, 0, 0, 0.6) !important;
    }

    .ruleta-frame {
        position: relative; 
        width: 100%;
        max-width: 550px; 
        aspect-ratio: 1 / 1; 
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
        filter: drop-shadow(0px 10px 15px rgba(0, 0, 0, 0.3));        
    }

    .ruleta-frame::after {
        content: ''; 
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("{% static 'images/Aro Ruleta 4.png' %}");
        background-size: contain;
        background-repeat: no-repeat;
        z-index: 10; 
        pointer-events: none; 
    }

    .wheel-container {
        filter: none; 
    }

    .ruleta-wrapper { 
        position: relative;
    }

    .triangle {
        position: absolute;
        top: 50%;
        transform: translateY(-50%) rotate(45deg); 
        z-index: 11;
        width: 10%; 
        height: 10%; 
        right: -3%; 
        background: linear-gradient(135deg,  #E1253C, #c54954, #97222D);
        border-radius: 50% 50% 50% 0;
        box-shadow: 
            -2px 2px 5px rgba(0,0,0,0.4),
            inset 1px -1px 2px rgba(0,0,0,0.3),
            inset 2px 2px 4px rgba(255,255,255,0.6);
    }

    .ruleta, #canvas {
        width: 100%; 
        height: 100%;
    }

    .center-circle {
        width: 20%;  
        height: 20%; 
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        background: radial-gradient(circle at 50% 35%, #FFFFFF, #979797 85%, #494949 100%);
        box-shadow: 
            inset 0px 5px 10px rgba(255, 255, 255, 0.5),
            inset 0px -5px 15px rgba(0, 0, 0, 0.3),
            0px 10px 20px rgba(0, 0, 0, 0.4); 
        z-index: 11;
    }

    .center-circle:hover {
        transform: translate(-50%, -50%) scale(1.05);
    }

    .center-circle:active {
        transform: translate(-50%, -50%) scale(1.02);
        box-shadow: 
            inset 0px 3px 8px rgba(255, 255, 255, 0.5),
            inset 0px -3px 10px rgba(0, 0, 0, 0.3),
            0px 5px 10px rgba(0, 0, 0, 0.3);
        transition-duration: 0.1s;
    }
    .center-image {
        width: 60%;
        filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.4));
    }

</style>
{% endblock  %}
   
{% block title %}
    Ruleta de la suerte
{% endblock title %}
    
{% block content %}
<div class="modal fade" id="premioModal" tabindex="-1" aria-labelledby="premioModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <img id="imagenModalResultado" src="{% static 'images/felicidades.png' %}" class="img-fluid mx-auto d-block" alt="...">
            </div>
            <div class="modal-body text-center">
                <div id="contenedorImagenPremio" style="margin-bottom: 1.5rem; display: none;">
                    <img id="fotoPremio" src="" class="img-fluid rounded" style="max-height: 150px; object-fit: contain;">
                </div>

                <p id="mensajePremio" style="color:#FFFFFF; font-size: 2rem; margin-bottom: 0.5rem;" class="fw-bold"></p> 
                
                <p id="descripcionPremio" style="color:#cccccc; font-size: 1.1rem; margin-bottom: 2rem;"></p>

                <button type="button" class="btn btn-light btn-lg" onclick="finalizarSorteo()">Finalizar</button>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="row mb-1">
        <div class="col-1 col-md-4 themed-grid-col"></div>
        <div class="col-10 col-md-4 themed-grid-col">
            <br>
            <div class="card card-borde-personalizado">
                <div class="card-header border-0">
                    <img src="{% static 'images/gira y gana.png' %}" class="img-fluid mx-auto d-block" alt="...">
                    <p id="winner" style="display: none;"></p>
                </div>
                <div class="card-body">
                    <br>
                    <div class ="ruleta-frame">
                        <div class="wheel-container">
                            <div class="ruleta-wrapper">
                                <canvas class="ruleta" id="canvas" width="480" height="480"></canvas>
                            </div>
                            <div class="center-circle" onclick="spin()"> 
                                <img src="{% static 'img/LogoLetrasEF.png' %}" alt="Logo" class="center-image logo">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-1 col-md-4 themed-grid-col"></div>
    </div>
</div>
<br>
{% endblock content %}
    

{% block js_footer %}
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script id="premios-data" type="application/json">{{ premiosDat|safe }}</script>

<script>
    function createStripesPattern() {
        const patternCanvas = document.createElement('canvas');
        const patternCtx = patternCanvas.getContext('2d');
        const PATTERN_SIZE = 10;
        patternCanvas.width = PATTERN_SIZE;
        patternCanvas.height = PATTERN_SIZE;

        patternCtx.strokeStyle = 'rgba(0, 0, 0, 0.08)'; 
        patternCtx.lineWidth = 1;
        patternCtx.beginPath();
        patternCtx.moveTo(0, PATTERN_SIZE);
        patternCtx.lineTo(PATTERN_SIZE, 0);
        patternCtx.stroke();
        
        return patternCtx.createPattern(patternCanvas, 'repeat');
    }

    const selectPattern = createStripesPattern();

    // Simula fuegos artificiales (Confeti)
    function lanzarFuegosArtificiales() {
        var duration = 2 * 1000; 
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1060 }; // z-index alto para estar sobre el modal

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) {
                return clearInterval(interval);
            }
            var particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { 
                particleCount, 
                origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                shapes: ['circle'], 
                colors: ['#ffc107', '#ffca2c', '#ffffff', '#ff9800'] 
            }));
            confetti(Object.assign({}, defaults, { 
                particleCount, 
                origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                shapes: ['circle'], 
                colors: ['#ffc107', '#ffca2c', '#ffffff', '#ff9800'] 
            }));
        }, 250);
    }

    // Funciones matemáticas de la ruleta
    function toRad(deg){ return deg * (Math.PI / 180.0); }
    function randomRange(min,max){ return Math.floor(Math.random() * (max - min + 1)) + min; }
    function easeOutSine(x) { return Math.sin((x * Math.PI) / 2); }
    function getPercent(input,min,max){ return (((input - min) * 100) / (max - min))/100; }
    
    function LightenDarkenColor(col, amt) {
        var usePound = false;
        if (col[0] == "#") { col = col.slice(1); usePound = true; }
        var num = parseInt(col, 16);
        var r = (num >> 16) + amt;
        if (r > 255) r = 255; else if  (r < 0) r = 0;
        var b = ((num >> 8) & 0x00FF) + amt;
        if (b > 255) b = 255; else if  (b < 0) b = 0;
        var g = (num & 0x0000FF) + amt;
        if (g > 255) g = 255; else if (g < 0) g = 0;
        return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16).padStart(6, '0');
    }

    // Configuración Inicial del Canvas
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const width = canvas.width;
    const height = canvas.height;
    const centerX = width/2;
    const centerY = height/2;
    const radius = width/2;

    // Procesar datos inyectados por Django de forma segura
    const premiosData = JSON.parse(document.getElementById('premios-data').textContent);
    console.table(premiosData);
    const items = premiosData.map(premio => premio.nombre);
    
    let currentDeg = 0;
    let step = 360/items.length;
    let itemDegs = {};
    
    function createWheel(){
        step = 360/items.length;
        draw();
    }

    document.fonts.ready.then(function() {
        draw(); // Dibuja cuando carga la fuente
    });

    function draw(){
        ctx.clearRect(0, 0, width, height);

        const palette = ['#c54954', '#003468', '#97222d', '#6b96b8', '#e1253c', '#97a1a7'];
        let startDeg = currentDeg;

        for(let i = 0; i < items.length; i++){
            let endDeg = startDeg + step;
            let color = palette[i % palette.length];

            // 1. Relleno y gradiente
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius , toRad(startDeg), toRad(endDeg));
            ctx.closePath();
            
            const gradient = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, radius);
            gradient.addColorStop(0, LightenDarkenColor(color, 60));
            gradient.addColorStop(1, color);
            ctx.fillStyle = gradient;
            ctx.fill();

            // 2. Patrón de rayas
            ctx.fillStyle = selectPattern;
            ctx.fill();

            // 3. Bordes 3D separadores
            const borderX = centerX + radius * Math.cos(toRad(startDeg));
            const borderY = centerY + radius * Math.sin(toRad(startDeg));

            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(borderX, borderY);
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)'; 
            ctx.lineWidth = 3; 
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(borderX, borderY);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)'; 
            ctx.lineWidth = 1; 
            ctx.stroke();

            // 4. Texto
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(toRad((startDeg + endDeg) / 2));
            ctx.textAlign = "left";
            ctx.textBaseline = 'middle';
            ctx.fillStyle = "#FFFFFF";
            ctx.font = '400 16px Montserrat';
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 4;
            ctx.fillText(items[i], radius * 0.25, 0);
            ctx.restore();

            itemDegs[items[i]] = { "startDeg": startDeg, "endDeg" : endDeg };
            startDeg += step;
        }
    }

    // --- VARIABLES DE ANIMACIÓN ---
    let speed = 0;
    let maxRotation = 0;
    let pause = false;
    let isSpinning = false;
    let resultadoFinal = null;

    function animate(){
        if(pause){ return; }
        speed = easeOutSine(getPercent(currentDeg, maxRotation, 0)) * 20;
        
        if(speed < 0.01){
            speed = 0;
            pause = true;
            isSpinning = false;
            mostrarResultadoModal(resultadoFinal);
        }
        currentDeg += speed;
        draw();
        window.requestAnimationFrame(animate);
    }
    
    // --- NUEVA LÓGICA DE SORTEO SEGURO CON AJAX ---
    async function spin() {
        // Bloquear doble click
        if (speed != 0 || isSpinning) { return; }
        isSpinning = true;

        try {
            // Preparar datos para el backend
            const formData = new FormData();
            formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');
            formData.append('codigo_ticket', '{{ codigo_ticket }}');
            formData.append('tienda_id', '{{ tienda.id }}');
            formData.append('encuesta_id', '{{ encuesta_id }}');

            // Llamar a nuestra nueva vista asíncrona y segura
            const response = await fetch('{% url "ejecutar_sorteo_ajax" %}', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errorData = await response.json();
                alert("Error: " + (errorData.error || "No se pudo realizar el sorteo."));
                isSpinning = false;
                return;
            }

            const data = await response.json();
                
            resultadoFinal = {
                nombre: data.nombre_premio,
                descripcion: data.descripcion_premio, // Capturamos descripción
                imagen: data.imagen_url,             // Capturamos imagen
                es_premio_real: data.es_premio_real
            };

            // Restablecer la ruleta a cero
            maxRotation = 0;
            currentDeg = 0;
            createWheel();
            draw();

            // Buscar en el diccionario visual dónde está la tajada que debemos mostrar
            const targetDeg = itemDegs[resultadoFinal.nombre];
            if (!targetDeg) {
                console.error("Premio dictaminado por el servidor no existe en la visual de la ruleta.");
                isSpinning = false;
                return;
            }

            // Calculamos cuánto debe girar: Varias vueltas enteras + caer dentro de los ángulos de la tajada
            maxRotation = (360 * 5) - targetDeg.endDeg + randomRange(5, step - 5);
            
            pause = false;
            window.requestAnimationFrame(animate);

        } catch (error) {
            console.error("Error en la petición del sorteo:", error);
            alert("Hubo un problema de conexión. Intente nuevamente.");
            isSpinning = false;
        }
    }

    // --- FUNCIÓN PARA MOSTRAR EL RESULTADO FINAL ---
    function mostrarResultadoModal(resultado) {
        document.getElementById('mensajePremio').innerText = resultado.nombre;
        document.getElementById('descripcionPremio').innerText = resultado.descripcion;
        
        const imgBanner = document.getElementById('imagenModalResultado');
        const contenedorFoto = document.getElementById('contenedorImagenPremio');
        const fotoPremio = document.getElementById('fotoPremio');
        
        if (resultado.es_premio_real) {
            imgBanner.src = "{% static 'images/felicidades.png' %}";
            imgBanner.style.display = "block";
            
            // Si el premio tiene una imagen cargada en el admin, la mostramos
            if (resultado.imagen) {
                fotoPremio.src = resultado.imagen;
                contenedorFoto.style.display = "block"; 
            } else {
                contenedorFoto.style.display = "none";
            }
            
            lanzarFuegosArtificiales();
        } else {
            // Caso de "Suerte para la próxima"
            imgBanner.src = "{% static 'images/sigue_intentando.png' %}";
            imgBanner.style.display = "block";
            contenedorFoto.style.display = "none";
        }

        var premioModal = new bootstrap.Modal(document.getElementById('premioModal'));
        premioModal.show();
    }

</script>
{% endblock %}
