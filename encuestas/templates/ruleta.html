{% extends 'base.html' %}
{% load static %}

{% block header %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">

<style>
    body {
        background-color: #003468 !important;
       /* background-image: url("{% static 'img/fondoruleta.png' %}");*/
        background-repeat: repeat;
        font-family: "Montserrat", sans-serif !important;
        color: #eeeeee !important;
    }

    .card {
        /* Fondo blanco con un 80% de opacidad (20% de transparencia) */
        background-color: rgba(0, 0, 0, 0) !important;
        
       /* background-color: none !important;*/
    }

    .card-borde-personalizado,
    .card-borde-personalizado .card-header,
    .card-borde-personalizado .card-footer {
        border-color: none ; /* O el color que prefieras */
        border: 0px solid rgba(0, 0, 0, .125) !important;
        background-color: rgba(0, 0, 0, 0) !important;
    }

    .titulo-ruleta {
        font-size: 20px;
        font-weight: 600;
    }

    .modal-content {
        background-color: rgba(0, 0, 0, 0.6) !important;
    }

    .ruleta-frame {
        position: relative; /* Esencial para posicionar la capa del marco */
        width: 100%;
        max-width: 550px; /* Ancho máximo del marco */
        aspect-ratio: 1 / 1; /* NUEVO: Mantiene la forma cuadrada/circular perfecta automáticamente */
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
        filter: drop-shadow(0px 10px 15px rgba(0, 0, 0, 0.3));        
        /* Ya NO ponemos la imagen de fondo aquí */
    }

    /* AÑADE ESTA NUEVA REGLA */
    .ruleta-frame::after {
        content: ''; /* Requerido para que el pseudo-elemento se muestre */
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        
        /* La imagen del marco va aquí */
        background-image: url("{% static 'images/Aro Ruleta 4.png' %}");
        background-size: contain;
        background-repeat: no-repeat;
        
        /* Estas dos líneas son la clave */
        z-index: 10; /* Pone esta capa por encima de las demás (el canvas tiene z-index 0 por defecto) */
        pointer-events: none; /* Hace que esta capa sea "invisible" a los clics, para que puedas presionar el botón de giro */
    }

    /* Ajustamos el contenedor de la ruleta para que encaje dentro del marco */
    .wheel-container {
        filter: none; /* Le quitamos la sombra propia porque ahora la tiene el marco */
    }


    .ruleta-wrapper { /* Un nuevo contenedor para el canvas y el puntero */
        position: relative;
    }

    /* MEJORADO: El nuevo puntero/marcador */
    .triangle {
        position: absolute;
        top: 50%;
        transform: translateY(-50%) rotate(45deg); /* La rotación se mantiene */
        z-index: 11;

        /* --- AJUSTES A PORCENTAJES --- */
        width: 10%; /* CAMBIADO: Antes 30px */
        height: 10%; /* CAMBIADO: Antes 30px */
        right: -3%; /* CAMBIADO: Antes -15px */

        /* --- El resto del estilo 3D se mantiene --- */
        background: linear-gradient(135deg,  #E1253C, #c54954, #97222D);
        border-radius: 50% 50% 50% 0;
        box-shadow: 
            -2px 2px 5px rgba(0,0,0,0.4),
            inset 1px -1px 2px rgba(0,0,0,0.3),
            inset 2px 2px 4px rgba(255,255,255,0.6);
    }



    .ruleta, #canvas {
        width: 100%; /* CAMBIADO: Hace que el canvas siempre llene el contenedor del marco */
        height: 100%;
    }


    /* MEJORADO: El botón central */
    .center-circle {
        width: 20%;  /* Antes 100px */
        height: 20%; 
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        background: radial-gradient(circle at 50% 35%, #FFFFFF, #979797 85%, #494949 100%);
 /*       box-shadow: 
        inset 0px 5px 10px rgba(255, 255, 255, 0.5), 
        inset 0px -5px 15px rgba(0, 0, 0, 0.3),   
        0px 5px 15px rgba(0, 0, 0, 0.3),           
        0px 0px 30px 10px rgba(255, 255, 204, 0.4);  */

        box-shadow: 
            inset 0px 5px 10px rgba(255, 255, 255, 0.5),
            inset 0px -5px 15px rgba(0, 0, 0, 0.3),
            0px 10px 20px rgba(0, 0, 0, 0.4); 
        z-index: 11;
    }

    .center-circle:hover {
        transform: translate(-50%, -50%) scale(1.05);
    }

    .center-circle:active {
        transform: translate(-50%, -50%) scale(1.02);
        box-shadow: 
            inset 0px 3px 8px rgba(255, 255, 255, 0.5),
            inset 0px -3px 10px rgba(0, 0, 0, 0.3),
            0px 5px 10px rgba(0, 0, 0, 0.3);
        transition-duration: 0.1s;
    }
    .center-image {
        width: 60%;
        /* Sombra sutil para que el logo se integre mejor */
        filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.4));
    }


    
    /* Estilos responsivos (sin cambios mayores) */
    @media (max-width: 576px) {
        /* El único ajuste que necesitamos es el del puntero, 
        ya que su posición en píxeles puede necesitar un retoque 
        cuando la ruleta es muy pequeña. */


        /* El resto de los elementos (.ruleta-frame, .center-circle, etc.) 
        se ajustarán automáticamente gracias al diseño fluido. */
    }


</style>
{% endblock  %}

{% block js_footer %}
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script id="premios-data" type="application/json">{{ premiosDat|safe }}</script>
<script>
    // --- INICIO DEL CÓDIGO JS CORREGIDO ---
    
    function createStripesPattern() {
        const patternCanvas = document.createElement('canvas');
        const patternCtx = patternCanvas.getContext('2d');
        const PATTERN_SIZE = 10;
        patternCanvas.width = PATTERN_SIZE;
        patternCanvas.height = PATTERN_SIZE;

        patternCtx.strokeStyle = 'rgba(0, 0, 0, 0.08)'; // Líneas oscuras y sutiles
        patternCtx.lineWidth = 1;
        patternCtx.beginPath();
        patternCtx.moveTo(0, PATTERN_SIZE);
        patternCtx.lineTo(PATTERN_SIZE, 0);
        patternCtx.stroke();
        
        return patternCtx.createPattern(patternCanvas, 'repeat');
    }



    function createDotPattern() {
        const patternCanvas = document.createElement('canvas');
        const patternCtx = patternCanvas.getContext('2d');
        const PATTERN_SIZE = 20; // Un tamaño mayor para que los puntos no estén tan juntos
        patternCanvas.width = PATTERN_SIZE;
        patternCanvas.height = PATTERN_SIZE;

        // Dibujamos un punto en el centro del pequeño lienzo
        patternCtx.fillStyle = 'rgba(0, 0, 0, 0.12)'; // Puntos oscuros y semitransparentes
        patternCtx.beginPath();
        patternCtx.arc(PATTERN_SIZE / 2, PATTERN_SIZE / 2, 1.5, 0, 2 * Math.PI); // Círculo pequeño
        patternCtx.fill();
        
        return patternCtx.createPattern(patternCanvas, 'repeat');
    }

    const stripesPattern = createStripesPattern();
    const dotPattern = createDotPattern(); // Puedes renombrar la variable a "dotPattern" si prefieres
    const selectPattern = stripesPattern;

// Simula fuegos artificiales
    function lanzarFuegosArtificiales() {
    var duration = 2 * 1000; // El efecto durará 2 segundos
    var animationEnd = Date.now() + duration;
    var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

    function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
    }

    var interval = setInterval(function() {
        var timeLeft = animationEnd - Date.now();

        if (timeLeft <= 0) {
        return clearInterval(interval);
        }

        var particleCount = 50 * (timeLeft / duration);
        // Lanza las partículas desde dos puntos para un efecto más lleno
        confetti(Object.assign({}, defaults, { 
            particleCount, 
            origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
            shapes: ['circle'], // ¡CLAVE! Usa círculos en vez de rectángulos
            colors: ['#ffc107', '#ffca2c', '#ffffff', '#ff9800'] // Colores de fuego/dorado
        }));
        confetti(Object.assign({}, defaults, { 
            particleCount, 
            origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
            shapes: ['circle'], // ¡CLAVE! Usa círculos en vez de rectángulos
            colors: ['#ffc107', '#ffca2c', '#ffffff', '#ff9800'] // Colores de fuego/dorado
        }));
    }, 250);
    }


    function mostrarPremiofinal(premio) {
        document.getElementById('mensajePremio').innerText = premio;
        enviarDatosPremio();
    }


    // Funciones del Modal y de envío de datos (SIN CAMBIOS)
    function mostrarPremio(premio) {
        lanzarFuegosArtificiales();

        // El resto de la función se mantiene igual
        document.getElementById('mensajePremio').innerText = premio;
        var premioModal = new bootstrap.Modal(document.getElementById('premioModal'));
        premioModal.show();
        setTimeout(function() {
            enviarDatosPremio();
        }, 100);
    }




    function enviarDatosPremio() {
        var form = document.createElement('form');
        form.method = 'POST';
        form.action = '/polls/guardar-premio/';
        var csrfToken = '{{ csrf_token }}';
        var csrfInput = document.createElement('input');
        csrfInput.type = 'hidden';
        csrfInput.name = 'csrfmiddlewaretoken';
        csrfInput.value = csrfToken;
        form.appendChild(csrfInput);
        var premioInput = document.createElement('input');
        premioInput.type = 'hidden';
        premioInput.name = 'premio';
        premioInput.value = document.getElementById('mensajePremio').innerText;
        form.appendChild(premioInput);
        var codigoTicketInput = document.createElement('input');
        codigoTicketInput.type = 'hidden';
        codigoTicketInput.name = 'codigo_ticket';
        codigoTicketInput.value = '{{ codigo_ticket }}';
        form.appendChild(codigoTicketInput);
        var encuesta_fijaInput = document.createElement('input');
        encuesta_fijaInput.type = 'hidden';
        encuesta_fijaInput.name = 'encuesta_fija';
        encuesta_fijaInput.value = '{{ encuesta_id }}';
        form.appendChild(encuesta_fijaInput);
        var tiendaInput = document.createElement('input');
        tiendaInput.type = 'hidden';
        tiendaInput.name = 'tienda';
        tiendaInput.value = '{{ tienda.id }}';
        form.appendChild(tiendaInput);
        document.body.appendChild(form);
        form.submit();
    }

    // Funciones de ayuda y matemáticas (SIN CAMBIOS)
    function toRad(deg){
        return deg * (Math.PI / 180.0);
    }
    
    function randomRange(min,max){
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    
    function easeOutSine(x) {
        return Math.sin((x * Math.PI) / 2);
    }
    
    function getPercent(input,min,max){
        return (((input - min) * 100) / (max - min))/100
    }
    
    function LightenDarkenColor(col, amt) {
        var usePound = false;
        if (col[0] == "#") {
            col = col.slice(1);
            usePound = true;
        }
        var num = parseInt(col, 16);
        var r = (num >> 16) + amt;
        if (r > 255) r = 255; else if  (r < 0) r = 0;
        var b = ((num >> 8) & 0x00FF) + amt;
        if (b > 255) b = 255; else if  (b < 0) b = 0;
        var g = (num & 0x0000FF) + amt;
        if (g > 255) g = 255; else if (g < 0) g = 0;
        return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16).padStart(6, '0');
    }

    // Configuración del Canvas y datos de premios
    const canvas = document.getElementById("canvas")
    const ctx = canvas.getContext("2d")
    const width = document.getElementById("canvas").width
    const height = document.getElementById("canvas").height
    const centerX = width/2
    const centerY = height/2
    const radius = width/2
    const premiosRawData = document.getElementById('premios-data').textContent;
    let modifiedString = premiosRawData.replace(/'/g, '"');
    const array = JSON.parse(modifiedString);
    const premiosData = array;
    const premios = premiosData.map(premio => premio.nombre);
    const probabilidades = premiosData.map(premio => premio.probabilidad);
    
    let items = premios;
    let currentDeg = 0
    let step = 360/items.length
    let itemDegs = {}
    
    // ¡Las llamadas a randomColor() han sido eliminadas de aquí!

    // Función createWheel (CORREGIDA)
    function createWheel(){
        items = premios;
        step = 360/items.length;
        draw();
    }

    // Llamada inicial para dibujar la ruleta
    document.fonts.ready.then(function() {
        console.log("Fuente Montserrat cargada. Dibujando ruleta inicial.");
        // Ahora que la fuente está lista, dibujamos la ruleta por primera vez
        draw();
    });

    // Función draw (NUEVA VERSIÓN)
    function draw(){
        ctx.clearRect(0, 0, width, height);

        const palette = ['#c54954', '#003468', '#97222d', '#6b96b8', '#e1253c', '#97a1a7'];
        let startDeg = currentDeg;

        // --- PASO 1: Dibujar TODOS los segmentos (sin cambios) ---
        for(let i = 0; i < items.length; i++){
            let endDeg = startDeg + step;
            let color = palette[i % palette.length];

            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius , toRad(startDeg), toRad(endDeg));
            ctx.closePath();
            
            const gradient = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, radius);
            gradient.addColorStop(0, LightenDarkenColor(color, 60));
            gradient.addColorStop(1, color);
            ctx.fillStyle = gradient;
            ctx.fill();

            ctx.fillStyle = selectPattern;
            ctx.fill();

            // --- NUEVO: DIBUJAR EL BORDE SEPARADOR 3D ---
            // Calculamos el punto final de la línea del borde (en el perímetro del círculo)
            const borderX = centerX + radius * Math.cos(toRad(startDeg));
            const borderY = centerY + radius * Math.sin(toRad(startDeg));

            // 1. Dibujar la sombra (línea oscura y ancha)
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(borderX, borderY);
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)'; // Negro semi-transparente
            ctx.lineWidth = 3; // Ancho de la sombra
            ctx.stroke();

            // 2. Dibujar el brillo (línea clara y delgada encima de la sombra)
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(borderX, borderY);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)'; // Blanco semi-transparente
            ctx.lineWidth = 1; // Ancho del brillo
            ctx.stroke();
            // --- FIN DEL CÓDIGO NUEVO ---



            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(toRad((startDeg + endDeg) / 2));
            ctx.textAlign = "left";
            ctx.textBaseline = 'middle';
            ctx.fillStyle = "#FFFFFF";
            ctx.font = '400 16px Montserrat';
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 4;
            ctx.fillText(items[i], radius * 0.25, 0);
            ctx.restore();

            itemDegs[items[i]] = { "startDeg": startDeg, "endDeg" : endDeg };

            if(startDeg % 360 < 360 && startDeg % 360 > 270 && endDeg % 360 > 0 && endDeg % 360 < 90 ){
                document.getElementById("winner").innerHTML = items[i];
            }

            startDeg += step;
        }



    }

    // Lógica de animación y giro (SIN CAMBIOS)
    let speed = 0
    let maxRotation = randomRange(360* 3, 360 * 6)
    let pause = false

    function animate(){
        if(pause){ return }
        speed = easeOutSine(getPercent(currentDeg, maxRotation, 0)) * 20;
        if(speed < 0.01){
            speed = 0
            pause = true
            const ganador = document.getElementById("winner").innerHTML;
            mostrarPremiofinal(ganador);
        }
        currentDeg += speed
        draw()
        window.requestAnimationFrame(animate);
    }
    
    function spin(){
        if(speed != 0){ return }
        //document.getElementById("winner").style.display = "block";
        maxRotation = 0;
        currentDeg = 0;
        createWheel();
        draw();
        let premioUser = selectPrize(premios, probabilidades);
        maxRotation = (360 * 5) - itemDegs[premioUser].endDeg + 10;
        itemDegs = {};
        pause = false;
        window.requestAnimationFrame(animate);
    }

    function selectPrize(premios, probabilidades) {
        if (premios.length !== probabilidades.length) {
            throw new Error("Las longitudes de premios y probabilidades deben ser iguales.");
        }
        const totalProbability = probabilidades.reduce((a, b) => a + b, 0);
        const random = Math.random() * totalProbability;
        let accumulated = 0;
        for (let i = 0; i < probabilidades.length; i++) {
            accumulated += probabilidades[i];
            if (random < accumulated) {
                return premios[i];
            }
        }
    }
</script>


{% endblock %}
